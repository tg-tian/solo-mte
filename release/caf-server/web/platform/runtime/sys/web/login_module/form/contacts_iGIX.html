<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript"
      src="../../../../../../platform/runtime/sys/web/login_module/script/jquery-3.5.1.min.js?v=202304240102">
    </script>
    <title>联系我们</title>
    <style>html{ height: 100%; } /* 移除body外边距 */ body{ margin: 0; height: 100%; } #rtf-contacts{ display: flex; flex-direction: column; height: 100%; overflow: scroll;} /* 头部样式 */ #rtf-contacts{ background-color: #f0f2f5; } #rtf-contacts__header{ /* height: 68px; */ padding: 20px 0; background: #FFFFFF; } #main__index{ background-color: #fff; padding: 20px; } #main__index .header__title--contacts{ padding-bottom: 30px; border-bottom: 0.5px solid rgba(40,55,108,0.22); } .header__icon-title{ margin-left: 80px; display: flex; } .header__icon-title div{ margin-right: 10px; } .header__icon-title div:last-child{ line-height: 1; } .header__icon-title img{ width: 174.37px; height: 20.68px; } .header__icon-title .header__icon--mid{ width: 1px;height: 20px;background-color: #C7CFDD;border-radius: 2px; } .content__icon{ display: flex; align-items: center; } .content__icon img{ width: 80px; /* margin-top: 50% */ height: 68px; } .header__title--contacts{ font-family: PingFangSC-Medium; font-size: 20px; color: #435069; font-weight: 500; } /* */ #rtf-contacts__main{ margin:auto; width: 80%; background-color: #fff; margin-top: 20px;margin-bottom: 20px;} #rtf-contacts__main #main__index{ /* width: 1045px; */ /* height: 600px; */ } .content__form{ flex: 1; margin-left: 20px; } /* 字段样式 */ .main__content--support{ display: flex; } #main__content{ margin: 0 20px; } #main__content .main__content--support{ padding: 30px 0; } #main__content .main__content--support:not(:last-child){ border-bottom: 0.5px solid rgba(40,55,108,0.22); } .form-title{ font-family: PingFangSC-Semibold; font-size: 16px; color: #435069; font-weight: 600; padding-bottom: 10px; } .form-controls{ display: flex; flex-wrap: wrap; } .form-controls .form-control{ /* flex: 1; */ width: 33.33%; word-wrap: break-word;} .form-controls .form-control .form-control__label{ white-space: pre;font-family: PingFangSC-Regular; font-size: 13px; color: rgba(67,80,105,0.51); font-weight: 400; margin-bottom: 5px; } .form-controls .form-control .form-control__name{ white-space: pre;font-family: PingFangSC-Regular; font-size: 14px; color: #435069; font-weight: 400; } .main__content--support .main__content--support__icon{ box-shadow: 0 2px 8px 0 #C1D8FF; }</style>
  </head>

  <body>
    <div id="rtf-contacts">
      <div id="rtf-contacts__header">
        <div class="header__icon-title">
          <div>
            <img id="i18nLogo" src="../../../../../../platform/runtime/sys/web/assets/img/LOGO@2x.png" alt="企业数字化云平台">
          </div>
          <div class="header__icon--mid">
          </div>
          <div>
            <span id="header_title" class="header__title--contacts"></span>
          </div>
        </div>
      </div>
      <div id="rtf-contacts__main">
        <div id="main__index">
          <div id="main__index_title" class="header__title--contacts"></div>
          <div id="main__content">
          </div>
        </div>
      </div>
    </div>
    <script type="text/javascript">
  
    var qlist = window.location.search.split('?')[1].split('&');
    var i18nResourceUrl='../../../../../../api/runtime/sys/v1.0/rtf-configuration/loginresource/'+qlist[0].split('=')[1]+'/'+qlist[1].split('=')[1];
    var i18Uri = '../../../../../../api/runtime/sys/v1.0/rtf-contact-channel?tenant=' + qlist[0].split('=')[1] + "&language=" + qlist[1].split('=')[1];
    qrest(i18nResourceUrl, false, "get", "json", null,
    function(result){
      document.getElementById("i18nLogo").src=result.logo;
      document.title=result.contactTitle;
      document.getElementById("header_title").append(result.contactTitle);
      document.getElementById("main__index_title").append(result.contactTitle);
    });
qrest(i18Uri, false, "get", "json", null,
    function (result) {
        if (result['自定义服务信息']&& result['自定义服务信息'].value.length > 0) {
            var div_out = document.createElement('div');
            var div_inner_1 = document.createElement('div');
            var div_inner_2 = document.createElement('div');
            var div_inner_2_1 = document.createElement('div');
            var div_inner_2_2 = document.createElement('div');
            var img_inner_1 = document.createElement('img');
            div_out.className = 'main__content--support';
            div_inner_1.className = 'content__icon';
            img_inner_1.src = './assets/cloud.png';
            div_inner_1.appendChild(img_inner_1);

            div_inner_2.className = 'content__form';
            div_inner_2_1.className = 'form-title';
            div_inner_2_2.className = 'form-controls';
            div_inner_2.appendChild(div_inner_2_1);
            div_inner_2.appendChild(div_inner_2_2);

            div_out.appendChild(div_inner_1);
            div_out.appendChild(div_inner_2);
            for (let i = 0; i < result['自定义服务信息'].value.length; i++) {
                var div = document.createElement('div');
                var div2 = document.createElement('div');
                var div3;
                var div4;
                div.className = 'form-control';
                div2.className = 'form-control__label';
                div2.append(result['自定义服务信息'].value[i].title);
                div.appendChild(div2);
                if (result['自定义服务信息'].value[i].content) {
                    div3 = document.createElement('div');
                    div3.className = 'form-control__name';
                    div3.append(result['自定义服务信息'].value[i].content);
                    div.appendChild(div3);
                }
                if (result['自定义服务信息'].value[i].image) {
                    div4 = document.createElement('img');
                    div4.className = 'form-control__name';
                    div4.style.width = '80px';
                    div4.style.height = '80px';
                    div4.style.display = 'block';
                    div4.src = result['自定义服务信息'].value[i].image;
                    div.appendChild(div4);
                }
                div_inner_2_2.appendChild(div);
            }
            div_inner_2_1.append(result['自定义服务信息'].title);
            document.getElementById('main__content').appendChild(div_out);
        }
        if (result['厂商服务信息']) {
            var div_out = document.createElement('div');
            var div_inner_1 = document.createElement('div');
            var div_inner_2 = document.createElement('div');
            var div_inner_2_1 = document.createElement('div');
            var div_inner_2_2 = document.createElement('div');
            var img_inner_1 = document.createElement('img');
            div_out.className = 'main__content--support';
            div_inner_1.className = 'content__icon';
            img_inner_1.src = './assets/cloud.png';
            div_inner_1.appendChild(img_inner_1);

            div_inner_2.className = 'content__form';
            div_inner_2_1.className = 'form-title';
            div_inner_2_2.className = 'form-controls';
            div_inner_2.appendChild(div_inner_2_1);
            div_inner_2.appendChild(div_inner_2_2);

            div_out.appendChild(div_inner_1);
            div_out.appendChild(div_inner_2);
            for (let i = 0; i < result['厂商服务信息'].length; i++) {
              for (let j = 0; j < result['厂商服务信息'][i].value.length; j++){
                var div = document.createElement('div');
                var div2 = document.createElement('div');
                var div3;
                var div4;
                div.className = 'form-control';
                div2.className = 'form-control__label';
                div2.append(result['厂商服务信息'][i].value[j].title);
                div.appendChild(div2);
                if (result['厂商服务信息'][i].value[j].content) {
                    div3 = document.createElement('div');
                    div3.className = 'form-control__name';
                    div3.append(result['厂商服务信息'][i].value[j].content);
                    div.appendChild(div3);
                }
                if (result['厂商服务信息'][i].value[j].image) {
                    div4 = document.createElement('img');
                    div4.className = 'form-control__name';
                    div4.style.width = '80px';
                    div4.style.height = '80px';
                    div4.style.display = 'block';
                    div4.src = result['厂商服务信息'][i].value[j].image;
                    div.appendChild(div4);
                }
                div_inner_2_2.appendChild(div);
              }  
              div_inner_2_1.append(result['厂商服务信息'][i].title);
            }
            document.getElementById('main__content').appendChild(div_out);
        }
    });

function qrest(url, async, method, dataType, param, suc, err) {
    $.ajax({
        url: url,
        async: async,
        type: method,
        contentType: 'application/json',
        dataType: dataType,
        data: param,
        success: function (data) {
            if (suc) {
                suc(data);
            }
        },
        error: function (_info) {
            if (err) {
                err(_info);
            } else return;
        }
    });
}
    </script>
  </body>

</html>
