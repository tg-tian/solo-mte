                            <input type="password" id="passinput_new" placeholder="請輸入新密碼" class="accountinput">
                            <img id="passinput_info" src="../../../../../../platform/runtime/sys/web/assets/img/passorigin.svg">
                            <div id="passinput_new_error" class="error"><p id="passinput_new_error_p" class="errorinfo"></p></div>
                        </div>
                        <div class="vcodeinfo">
                            <div class="vcode">確認新密碼</div>
                            <input type="password" id="passinput_net" placeholder="請再次輸入新密碼" class="vcodeinput newpassinput">
                            <div id="passinput_net_error" class="error"><p id="passinput_net_error_p" class="errorinfo"></p></div>
                        </div>
                        <div id="pass_change_error" class="keyinfo_vcode_send_error" >
                            <img id="pass_change_error_i" src="../../../../../../platform/runtime/sys/web/assets/img/pvcodefail.svg" class="keyinfo_vcode_send_error_i"></img>
                            <p id="pass_change_error_error_p" class="keyinfo_vcode_send_error_p"> 密碼重置失敗，請稍候再試</p>
                        </div>
                        <div id="passinfo_tri" class="passinfo_tri" style="display:none"><div class="passinfo_out"></div></div>
                        <div id="passinfo" class="passinfo" style="display:none"></div>
                    </div>
                    <div id="nextStep_btn">
                        <button class="next" onclick="nextStep()">下一步</button>
                        <!-- <div class="tipinfo">
                            <div class="tip1">仍未解决？</div>
                            <div class="tip2">聯系管理員</div>
                        </div> -->
                    </div>
                </div>
                <div id="pstep4" class="pstep4" style="display:none">
                    <img src="../../../../../../platform/runtime/sys/web/assets/img/passsetover.png" style="width: 104px;height: 86px;">
                    <div class="pstep4info">密碼重置成功</div>
                    <div class="pstep4_relogin_info">
                        <div id="pstep4numinfo" class="pstep4_relogin_info1">8秒後跳回登入頁面，或</div>
                        <div class="pstep4_relogin_info2" onclick="passreload()">立即登录</div>
                    </div>
                </div>
            </div>
        </div>
    </body>

</html>
