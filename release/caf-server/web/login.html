<html>
<meta name="renderer" content="webkit">
<script>
    window.isRTFLogin = true;
</script>

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=11">
    <meta http-equiv="pragram" content="no-cache">
    <meta http-equiv="cache-control" content="no-cache, must-revalidate">
    <meta http-equiv="expires" content="0">
    <title id="title"></title>
    <link id="page-icon" rel="SHORTCUT ICON" href="">
    <link rel="stylesheet" type="text/css" href="./platform/runtime/sys/web/assets/style/themes/default/gsp-cloud-web.css?v=2024050901">
    <link rel="stylesheet" type="text/css" href="./platform/runtime/sys/web/assets/style/themes/default/gsp-cloud-login.css?v=2024050901">
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/jquery-3.5.1.min.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/jquery.i18n.properties-1.0.9.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/jsencrypt.min.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/common/web/gsprtf/gsp.rtf.common.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/bro.check.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/login.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/gsp-cloud-login.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/gsp.cloud.form.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/gsp.cloud.form.userpassword.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/gsp.cloud.form.sms.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/gsp.cloud.form.nophonesms.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/gsp.security.form.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/gspCA.js?v=2024050901"></script>
    <script type="text/javascript" src="./platform/runtime/sys/web/login_module/script/preload.js?v=2024050901"></script>
    <script type="text/javascript">
    </script>
    <style type="text/css">
        .new-loginform-contact-title {
            width: 44px;
            height: 135px;
            background-image: linear-gradient(46deg, #2E77FF 0%, #2A87FF 100%);
            box-shadow: 0 0 14px 0 rgb(94 112 153 / 41%);
            border-radius: 22px;
            position: absolute;
            right: 6px;
            top: 23%;
            writing-mode: tb;
            font-family: PingFangSC-Medium;
            font-size: 12.81px;
            color: #FFFFFF;
            text-align: center;
            line-height: 17.08px;
            font-weight: 500;
            padding-right: 10px;
            letter-spacing: 2px;
            z-index: 999;
            cursor: pointer;
        }

        .new-loginform-contact-title-hover {
            background: #FFFFFF;
            box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.10);
            width: 400px;
            position: absolute;
            right: 63px;
            top: 23%;
            border-radius: 8px;
            z-index: 999;
            padding: 1% 2% 1% 2%;
            max-height: 400px;
            overflow-y: scroll;
        }

        .new-loginform-contact-title-hover-border {
            margin-top: 3.3%
        }

        .new-loginform-contact-title-hover-title {
            font-family: PingFangSC-Semibold;
            font-size: 18px;
            color: #000000;
            font-weight: 600;
            display: inline;
            white-space: pre;
        }

        .new-loginform-contact-title-hover-value {
            font-family: PingFangSC-Regular;
            font-size: 14px;
            color: #434E5C;
            line-height: 22px;
            font-weight: 400;
            margin-top: 1.3%;
            white-space: pre;
        }

        .new-loginform-contact-title-more {
            font-family: PingFangSC-Regular;
            font-size: 14px;
            color: #2A87FF;
            font-weight: 400;
            bottom: 0;
            right: 5%;
            position: relative;
            cursor: pointer;
            margin-top: 3%;
            float: right;
        }

        .new-loginform-contact-title-tri {
            background: #FFFFFF;
            box-shadow: 0 0 20px 0 rgb(0 0 0 / 10%);
            width: 25px;
            height: 25px;
            position: absolute;
            right: 61px;
            top: 25%;
            z-index: 999;
            transform: rotate(45deg);
        }

        .msg-login-out {
            position: absolute;
            background: #FFFFFF;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.06);
            border-radius: 16px;
            width: 400px;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
            height: 150px;
        }

        .msg-login-innercontext {
            font-size: 15px;
            color: #2D2F33;
            line-height: 22px;
            font-weight: 400;
        }

        .msg-login-btn-out {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-shrink: 0;
            padding-right: 20px;
        }


        .msg-login-btn-ok {
            background-image: linear-gradient(-51deg, #328BFF 0%, #2A87FF 100%);
            box-shadow: 0 4px 10px 0 rgba(69, 144, 255, 0.25);
            border-radius: 6px;
            font-size: 13px;
            color: #FFFFFF;
            font-weight: 400;
        }

        .msg-login-btn-cancel {
            background: #FFFFFF;
            border: 1px solid #E8EBF2;
            box-shadow: 0 2px 6px 0 rgba(31, 35, 41, 0.06);
            border-radius: 6px;
            font-size: 13px;
            color: #2D2F33;
            text-align: center;
            line-height: 18px;
            font-weight: 400;
            margin-right: 8px;
        }

        .msg-dialog-user-edit {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding-left: 18px !important;
            margin-top: 25px;
        }

        .msg-login-innercontext-sub {
            font-size: 13px;
            color: #747B8B;
            line-height: 20px;
            font-weight: 400;
            display: inline-block;
        }
    </style>
</head>

<body id="main" style=" display:none;" class="main">
    <div id="background_img" class="bodyback">
        <div style="display: none;">
            <div id="new-loginform-contact-tri" class="new-loginform-contact-title-tri" style="display:none;"></div>
            <div id="new-loginform-contact-title-out" class="new-loginform-contact-title" onclick="showContactInfo()">
                <img src="./platform/runtime/sys/web/assets/img/us.svg" width="24px" height="24px">
                <div id="new-loginform-contact-title" style="display:
                        inline;"></div>
            </div>
            <div id="new-loginform-contact" class="new-loginform-contact-title-hover" style="display:none;">
                <div id="new-loginform-contact-title-more" class="new-loginform-contact-title-more" onclick="openDetailInfo()"></div>
            </div>
        </div>

        <div class="bodyimg">
            <img id="logo" class="bodylogo" style="height:auto
                    !important;max-height: 55px;">
            <div id='lanEx' class="lanEx" style="display:none;">
                <span class="login-lg-text mr-2 languagetype" style="position: relative;display:
                        inline-flex;vertical-align: middle;" id="languagetype"></span>
                <div class="btn-group login-lg-dropdown">
                    <button id="btn_language" type="button" class="btn p-0
                            m-0 bg-transparent dropdown-toggle" onclick="btn_languageclick()">
                        <span id="span_language" class="lg-login-zh-CHS"></span>
                    </button>
                    <div id="languageDropdown" class="dropdown-menu p-1" onmouseleave='languageDropdown_leave()'>
                    </div>
                </div>
            </div>
        </div>
        <div class="m-0 login-setting-out" id="login_form">
            <section id="login_form_section" class="login-section
                    login-sectionex" style="position: absolute;right: 11%;
                    margin-right: 0;top: 15%">
                <div id="login_overlay" class="login_overlay"></div>
                <!-- login form -->
                <form id='loginform' name='login' class="login-form
                        login-form-ex" action="./sign-in" method="post">
                    <input type="text" id="language" name="language" style="display:none">
                    <input type="text" id="seType" name="seType" style="display:none">
                    <hr class="login-setting-hr">
                    <div id="tenant_div">
                        <img src="./platform/runtime/sys/web/assets/img/tenant.svg" class="selectimg">
                        <select id="tenant" name="Tenant" class="custom-select w-100 loginsection
                                formselect" style="display:inline" onchange="changetostrategy()">
                        </select>
                    </div>
                    <!-- auth type select-->
                    <div id="authenstrategy_div">
                        <img src="./platform/runtime/sys/web/assets/img/authtype.svg" class="selectimg">
                        <select id="authenstrategy" name="Authenstrategy" class="custom-select w-100 loginsection
                                formselect" style="display:inline" onchange="changeauthenform()">
                        </select>
                    </div>
                    <!-- user password login -->
                    <div id='authenform'>
                        <div id="userpassword">
                        </div>
                    </div>

                    <div id="vcode" style="display: none">
                        <span class="form-control
                                login-setting-authen-span">
                                <img
                                    src="./platform/runtime/sys/web/assets/img/vcode.svg"
                                    class="login-setting-authen-vcode-img">
                                <input type="text" id="vcode_input"
                                    class="form-control login-setting-vc"
                                    name="vc" autocomplete="off"
                                    placeholder="请输入验证码">
                            </span>
                        <a href="javascript:void(0);" onclick="updateVcode()" class="login-setting-vcode-img">
                            <img id="vcode_img" alt="验证码">
                        </a>
                    </div>
                    <div class="clearfix">
                        <div id="remEx" class="form-check float-left
                                remember-info" style="display:none">
                            <input class="form-check-input
                                    login-setting-rem" type="checkbox" value="" id="rememberInfo">
                            <label class="form-check-label p-0
                                    rememberInfo_lab" id="rememberInfo_lab"></label>
                        </div>
                        <div id="reEx" style="display:none">
                            <a class="float-right forgetpwd" id="forgetpwd" onclick="resetShow()"></a>
                        </div>
                    </div>
                    <div class="form-actions" style="margin-top: 10px;">
                        <div id="errorMessage" class="alert p-1 login-tips" style="display:none">
                        </div>
                        <button type="button" id="login" class="btn block
                                w-100 formbtn" onclick='beforesubmit()'></button>
                        <div id='otherEx' style="display:none">
                            <div style="display: none">
                                <p id="otherway" class="otherway" style="display:inline;"></p>
                                <p id="OAuth2Client" class="text-center
                                        btn-regist" style="display:inline">
                                    <div id="j_lcid" onclick="singlerest('./api/runtime/sys/v1.0/routerRedirect',false,'get','json',null)">
                                        <img src="platform/runtime/sys/web/assets/img/InspurId.png" width="16" height="16" class="login-setting-oauth">
                                    </div>
                                </p>
                            </div>
                        </div>
                    </div>
                </form>
                <!-- phone code 短信验证码 -->
                <div id='login-mobile-message-code' class="login-form
                        login-form-ex" style="display: none;">
                    <hr class="login-setting-hr">

                    <!-- 记住我的信息 -->
                    <div class="clearfix">
                        <div id="remEx" class="form-check float-left
                                remember-info" style="display:none">
                            <input class="form-check-input
                                    login-setting-rem" type="checkbox" value="" id="rememberInfo">
                            <label class="form-check-label p-0
                                    rememberInfo_lab" id="rememberInfo_lab"></label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <!-- 提示消息显示区域 -->
                        <div id="errorMessage" class="alert p-1 login-tips" style="display:none">
                        </div>
                        <!-- 登录按钮 -->
                        <button type="button" id="login" class="btn block
                                w-100 formbtn" onclick='beforesubmit()'></button>
                        <!--使用其他方式登录  -->
                        <div id='otherEx' style="display:none">
                            <div style="display: none">
                                <p id="otherway" class="otherway" style="display:inline;"></p>
                                <p id="OAuth2Client" class="text-center
                                        btn-regist" style="display:inline">
                                    <div id="j_lcid" onclick="singlerest('./api/runtime/sys/v1.0/routerRedirect',false,'get','json',null)">
                                        <img src="platform/runtime/sys/web/assets/img/InspurId.png" width="16" height="16" class="login-setting-oauth">
                                    </div>
                                </p>
                            </div>
                        </div>
                    </div>
                    </form>
            </section>
            </div>
        </div>
        <!-- footer -->
        <div class="login-setting-whole">
            <ul class="login-setting-whole-authex">
                <li class="login-setting-whole-ex">
                    <ul id="declear">
                    </ul>
                </li>
            </ul>
        </div>
        <!-- other -->
        <div id="OpenWindow">
            <a id="aOpen" href="#OpenWindow" rel="leanModal"></a>
            <div id="ct">
                <div id="OpenWindow-header">
                    <div class="login-setting-header" id="changpwd_div"></div>
                    <div id="pwdwarning" class="login-setting-warning"></div>
                    <a id="close_btn" href="#" class="jsclose" style="text-decoration:none;">×</a>
                </div>
                <div>
                    <div class="txt-fld">
                        <label id="oldpwd_lab"> </label>
                        <input type="password" id="oldpwd" title="" class="form-control
                            login-setting-changepw-input" autocomplete="off" oncontextmenu="return false" oncopy="return
                            false" oncut="return false" onkeyup="pwdTipsWarnings(event)" />
                        <img id="oldpwdicon" src="./platform/runtime/sys/web/assets/img/ph.svg" class="login-setting-changepw-img" onmousedown="changePwdIconStete(event)" onmouseup="resetIconState()">
                    </div>
                    <div class="txt-fld">
                        <label id="newpwd_lab"> </label>
                        <input type="password" id="newpwd" title="" class="form-control
                            login-setting-changepw-input" autocomplete="off" onpaste="return false" oncontextmenu="return
                            false" oncopy="return false" oncut="return
                            false" onkeyup="pwdTipsWarnings(event)" />
                        <img id="newpwdicon" src="./platform/runtime/sys/web/assets/img/ph.svg" class="login-setting-changepw-img" onmousedown="changePwdIconStete(event)" onmouseup="resetIconState()">
                    </div>
                    <div class="txt-fld">
                        <label id="ensure_lab"> </label>
                        <input type="password" id="ensurepwd" title="" class="form-control
                            login-setting-changepw-input" autocomplete="off" onpaste="return false" oncontextmenu="return
                            false" oncopy="return false" oncut="return
                            false" onkeyup="pwdTipsWarnings(event)" />
                        <img id="enpwdicon" src="./platform/runtime/sys/web/assets/img/ph.svg" class="login-setting-changepw-img" onmousedown="changePwdIconStete(event)" onmouseup="resetIconState()">
                    </div>
                    <div class="btn-fld">
                        <button id="submitpwd" type="button" class="btn-login btn block
                            login-setting-changepw-sub" onclick="changepwd()"></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 重复登录提示 -->
        <div id="msg-content" class="msg-login-out" style="display: none;">
            <div class="edit-modal-body" style="height: 100px">
                <div class="msg-dialog-user-edit">
                    <img src="./platform/runtime/sys/web/assets/img/warn-login.svg">
                    <div>
                        <span id="login2Info" class="dialog-user-edit-text msg-login-innercontext"></span>
                        <span id="login2Detail" class="dialog-user-edit-text msg-login-innercontext msg-login-innercontext-sub"></span>
                    </div>
                </div>
            </div>
            <div class="msg-login-btn-out" >
                <div>
                    <button id="login2Cancel" class="btn-secondary btn ng-star-inserted msg-login-btn-cancel" onclick="msgCancel()"></button>
                    <button id="login2OK" class="btn-primary btn msg-login-btn-ok" onclick="msgOK()"></button>
                </div>
            </div>
        </div>
</body>

</html>
