# SU描述格式（Scheme）的版本
api: caf.inspures.com/v1alpha1
# 申明当前描述的是一个SU的基本信息
kind: ServiceUnit
metadata:
  annotations:
      # SU命名空间（平台SU：com.inspures.igix,业务SU：com.inspures.gs-cloud）
      caf.inspures.com/group: com.inspures.igix
      # SU显示名称
      caf.inspures.com/alias: 系统框架
      # SU版本
      caf.inspures.com/version: latest
  # SU编号
  name: Sys
spec:
  # SU所属App的信息
  application:
    # SU所属的App编号
    name: runtime
    # SU所属的App显示名
    alias: iGIX Server
    # SU所属的App版本
    version: latest
  # SU在安装盘的路径
  path: /platform/runtime/sys
  runtime:
    type: igix-standard # caf-server caf-api-server caf-web-server
    version: latest # ^5.5.0 / [5.5.0, 6.0.0)

  # 必须依赖关系信息，不依赖无法启动
  dependencies:
    # 命名空间（平台SU：com.inspures.igix,业务SU：com.inspures.gs-cloud）
  - group: com.inspures.igix
    # SU编号
    name: pfcommon
    # 版本
    version: latest
  - group: com.inspures.igix
    name: rtcommon
    version: latest
